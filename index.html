<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Abacus Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#f0f4f1;color:#1a2e1a;font-family:system-ui,sans-serif;min-height:100vh}
  input,select,textarea,button{font-family:inherit}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#e4ede4}
  ::-webkit-scrollbar-thumb{background:#6b9e6b;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

// ── Palette ──────────────────────────────────────────────────────────────────
const C = {
  bg:        "#f0f4f1",
  surface:   "#ffffff",
  surface2:  "#eaf2ea",
  border:    "#c8ddc8",
  border2:   "#b0cfb0",
  header:    "#1b4332",
  headerText:"#ffffff",
  tabActive: "#1b4332",
  tabText:   "#4a7c59",
  tabInactive:"#6b9e6b",
  primary:   "#1b4332",
  primaryHov:"#14532d",
  accent:    "#2d6a4f",
  accentLt:  "#40916c",
  green:     "#1b4332",
  greenLt:   "#d8f3dc",
  greenText: "#1b4332",
  muted:     "#6b7a6b",
  mutedLt:   "#9db89d",
  text:      "#1a2e1a",
  textSub:   "#4a6349",
  danger:    "#991b1b",
  dangerBg:  "#fee2e2",
  yellow:    "#92400e",
  yellowBg:  "#fef3c7",
  blue:      "#1e40af",
  blueBg:    "#dbeafe",
  purple:    "#5b21b6",
  purpleBg:  "#ede9fe",
};

const TABS = ["Agency Explorer","Query Library","Annotations"];

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return{headers:[],rows:[]};
  const headers=lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,""));
  const rows=lines.slice(1).map(line=>{
    const vals=[];let cur="",inQ=false;
    for(const ch of line){
      if(ch==='"')inQ=!inQ;
      else if(ch===','&&!inQ){vals.push(cur.trim());cur="";}
      else cur+=ch;
    }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>{obj[h]=(vals[i]??"").replace(/^"|"$/g,"");});
    return obj;
  });
  return{headers,rows};
}

function num(v){return parseFloat(String(v).replace(/[,$]/g,""))||0;}
function fmt(n){return"$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function uniq(arr){return[...new Set(arr.filter(Boolean))].sort();}

const BADGE = {
  green:  {bg:C.greenLt, text:C.greenText, border:"#95d5b2"},
  blue:   {bg:C.blueBg,  text:C.blue,      border:"#93c5fd"},
  yellow: {bg:C.yellowBg,text:C.yellow,    border:"#fcd34d"},
  gray:   {bg:"#f3f4f6", text:"#374151",   border:"#d1d5db"},
  red:    {bg:C.dangerBg,text:C.danger,    border:"#fca5a5"},
  purple: {bg:C.purpleBg,text:C.purple,    border:"#c4b5fd"},
};

const TAG_COLORS = {
  "Data Quirk": BADGE.yellow,
  "Validated":  BADGE.green,
  "Follow Up":  BADGE.red,
  "General":    BADGE.gray,
};

function Badge({label,color="gray"}){
  const c=BADGE[color]||BADGE.gray;
  return(
    <span style={{background:c.bg,color:c.text,border:`1px solid ${c.border}`,
      fontSize:11,padding:"2px 8px",borderRadius:999,fontWeight:500,whiteSpace:"nowrap",display:"inline-block"}}>
      {label}
    </span>
  );
}

function StatCard({label,value,accent}){
  return(
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",
      boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
      <div style={{fontSize:11,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:.5}}>{label}</div>
      <div style={{fontSize:15,fontWeight:700,color:accent||C.text}}>{value}</div>
    </div>
  );
}

function DropZone({onFile,dataSource}){
  const [dragging,setDragging]=useState(false);
  const inputRef=useRef();
  const handle=file=>{
    if(!file||!file.name.endsWith(".csv"))return;
    const r=new FileReader();
    r.onload=e=>onFile(e.target.result,file.name);
    r.readAsText(file);
  };
  return(
    <div
      onDragOver={e=>{e.preventDefault();setDragging(true);}}
      onDragLeave={()=>setDragging(false)}
      onDrop={e=>{e.preventDefault();setDragging(false);handle(e.dataTransfer.files[0]);}}
      onClick={()=>inputRef.current.click()}
      style={{border:`2px dashed ${dragging?C.accentLt:C.border2}`,borderRadius:12,padding:"10px 16px",
        cursor:"pointer",display:"flex",alignItems:"center",gap:12,
        background:dragging?"#d8f3dc":C.surface,transition:"all .2s",
        boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}
    >
      <input ref={inputRef} type="file" accept=".csv" style={{display:"none"}} onChange={e=>handle(e.target.files[0])} />
      <span style={{fontSize:20}}>📂</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,fontWeight:500,color:C.text}}>Drop Abacus CSV</div>
        {dataSource
          ?<div style={{fontSize:11,color:C.accent,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>✓ {dataSource}</div>
          :<div style={{fontSize:11,color:C.muted,marginTop:2}}>Drag & drop or click to browse</div>}
      </div>
      {dataSource&&<Badge label="Loaded" color="green"/>}
    </div>
  );
}

function Sel({label,value,onChange,options}){
  return(
    <select value={value} onChange={e=>onChange(e.target.value)}
      style={{background:C.surface,border:`1px solid ${C.border}`,color:C.text,borderRadius:8,
        padding:"5px 10px",fontSize:12,outline:"none",cursor:"pointer",
        boxShadow:"0 1px 2px rgba(0,0,0,0.04)"}}>
      <option value="ALL">All {label}</option>
      {options.map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  );
}

// ── Agency Explorer ──────────────────────────────────────────────────────────
function AgencyExplorer({annotations,onAnnotate}){
  const [rows,setRows]=useState([]);
  const [src,setSrc]=useState(null);
  const [search,setSearch]=useState("");
  const [expanded,setExpanded]=useState(null);
  const [expandedBroker,setExpandedBroker]=useState(null);
  const [agencySort,setAgencySort]=useState("desc");
  const [filters,setFilters]=useState({carrier:"ALL",branch:"ALL",policyType:"ALL",state:"ALL",txType:"ALL"});
  const [dateFrom,setDateFrom]=useState("");
  const [dateTo,setDateTo]=useState("");

  const setF=(k,v)=>setFilters(f=>({...f,[k]:v}));
  const activeFilters=Object.values(filters).filter(v=>v!=="ALL").length;

  const loadCSV=(text,filename)=>{
    const {rows}=parseCSV(text);
    setRows(rows.map(r=>({...r,
      BIND_PREMIUM:num(r.BIND_PREMIUM),TOTAL_BIND_COST:num(r.TOTAL_BIND_COST),
      FEES_AND_DUES:num(r.FEES_AND_DUES),BIND_FEES_AND_DUES:num(r.BIND_FEES_AND_DUES),
      POLICY_COUNT:num(r.POLICY_COUNT)})));
    setSrc(filename);setExpanded(null);setExpandedBroker(null);
    setFilters({carrier:"ALL",branch:"ALL",policyType:"ALL",state:"ALL",txType:"ALL"});
  };

  let fr=rows;
  if(filters.carrier!=="ALL")fr=fr.filter(r=>r.CARRIER_NAME===filters.carrier);
  if(filters.branch!=="ALL")fr=fr.filter(r=>r.BRANCH_NAME===filters.branch);
  if(filters.policyType!=="ALL")fr=fr.filter(r=>r.POLICYTYPE_NAME===filters.policyType);
  if(filters.state!=="ALL")fr=fr.filter(r=>r.STATE_NAME===filters.state);
  if(filters.txType!=="ALL")fr=fr.filter(r=>r.TRANSACTION_TYPE===filters.txType);
  if(dateFrom)fr=fr.filter(r=>r.EFFECTIVE_MONTH&&r.EFFECTIVE_MONTH>=dateFrom);
  if(dateTo)fr=fr.filter(r=>r.EFFECTIVE_MONTH&&r.EFFECTIVE_MONTH<=dateTo);

  const agencyMap={};
  fr.forEach(r=>{
    const a=r.AGENCY_NAME||"(Unknown Agency)";
    if(!agencyMap[a])agencyMap[a]={};
    const b=r.BROKER_NAME||"(Unknown Broker)";
    if(!agencyMap[a][b])agencyMap[a][b]={rows:[],email:r.BROKER_EMAIL||""};
    agencyMap[a][b].rows.push(r);
  });

  const agTot=name=>{
    const ar=Object.values(agencyMap[name]||{}).flatMap(b=>b.rows);
    return{
      bindPremium:ar.reduce((s,r)=>s+r.BIND_PREMIUM,0),
      totalBindCost:ar.reduce((s,r)=>s+r.TOTAL_BIND_COST,0),
      policyCount:ar.reduce((s,r)=>s+r.POLICY_COUNT,0),
      brokerCount:Object.keys(agencyMap[name]||{}).length,
    };
  };

  let agencies=Object.keys(agencyMap).filter(a=>!search||a.toLowerCase().includes(search.toLowerCase()));
  agencies=agencies.sort((a,b)=>{
    const diff=agTot(b).bindPremium-agTot(a).bindPremium;
    return agencySort==="desc"?diff:-diff;
  });

  const totBind=fr.reduce((s,r)=>s+r.BIND_PREMIUM,0);
  const totFees=fr.reduce((s,r)=>s+r.FEES_AND_DUES,0);
  const totBindFees=fr.reduce((s,r)=>s+r.BIND_FEES_AND_DUES,0);
  const totCost=fr.reduce((s,r)=>s+r.TOTAL_BIND_COST,0);
  const totPolicies=fr.reduce((s,r)=>s+r.POLICY_COUNT,0);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <DropZone onFile={loadCSV} dataSource={src}/>
      {rows.length===0?(
        <div style={{textAlign:"center",color:C.muted,padding:"64px 0"}}>
          <div style={{fontSize:40,marginBottom:12}}>🏢</div>
          <div style={{fontSize:14}}>Drop your Abacus CSV to explore agencies and brokers</div>
        </div>
      ):(
        <>
          {/* Controls */}
          <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Search agencies..."
              style={{background:C.surface,border:`1px solid ${C.border}`,color:C.text,borderRadius:8,
                padding:"6px 12px",fontSize:13,outline:"none",minWidth:180,
                boxShadow:"0 1px 2px rgba(0,0,0,0.04)"}}/>
            <button onClick={()=>setAgencySort(s=>s==="desc"?"asc":"desc")}
              style={{background:C.surface,border:`1px solid ${C.border}`,color:C.text,borderRadius:8,
                padding:"6px 12px",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:6,
                boxShadow:"0 1px 2px rgba(0,0,0,0.04)"}}>
              Bind Premium {agencySort==="desc"?"↓":"↑"}
            </button>
            <div style={{width:1,height:20,background:C.border}}/>
            <Sel label="Carriers" value={filters.carrier} onChange={v=>setF("carrier",v)} options={uniq(rows.map(r=>r.CARRIER_NAME))}/>
            <Sel label="Branches" value={filters.branch} onChange={v=>setF("branch",v)} options={uniq(rows.map(r=>r.BRANCH_NAME))}/>
            <Sel label="Policy Types" value={filters.policyType} onChange={v=>setF("policyType",v)} options={uniq(rows.map(r=>r.POLICYTYPE_NAME))}/>
            <Sel label="States" value={filters.state} onChange={v=>setF("state",v)} options={uniq(rows.map(r=>r.STATE_NAME))}/>
            <Sel label="Tx Types" value={filters.txType} onChange={v=>setF("txType",v)} options={uniq(rows.map(r=>r.TRANSACTION_TYPE))}/>
            {activeFilters>0&&<button onClick={()=>setFilters({carrier:"ALL",branch:"ALL",policyType:"ALL",state:"ALL",txType:"ALL"})}
              style={{background:"none",border:"none",color:C.accentLt,fontSize:12,cursor:"pointer",fontWeight:500}}>
              Clear ({activeFilters})
            </button>}
            <div style={{width:1,height:20,background:C.border}}/>
            <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:C.muted}}>
              <span>From</span>
              <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}
                style={{background:C.surface,border:`1px solid ${C.border}`,color:C.text,borderRadius:8,
                  padding:"5px 10px",fontSize:12,outline:"none",cursor:"pointer"}}/>
              <span>To</span>
              <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}
                style={{background:C.surface,border:`1px solid ${C.border}`,color:C.text,borderRadius:8,
                  padding:"5px 10px",fontSize:12,outline:"none",cursor:"pointer"}}/>
              {(dateFrom||dateTo)&&<button onClick={()=>{setDateFrom("");setDateTo("");}}
                style={{background:"none",border:"none",color:C.accentLt,fontSize:12,cursor:"pointer",fontWeight:500}}>
                Clear dates
              </button>}
            </div>
            <span style={{fontSize:12,color:C.muted,marginLeft:"auto"}}>{agencies.length} agencies · {fr.length} rows</span>
          </div>

          {/* Totals */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12}}>
            <StatCard label="Bind Premium" value={fmt(totBind)} accent={C.green}/>
            <StatCard label="Fees & Dues" value={fmt(totFees)}/>
            <StatCard label="Bind Fees & Dues" value={fmt(totBindFees)}/>
            <StatCard label="Total Bind Cost" value={fmt(totCost)} accent={C.accent}/>
            <StatCard label="Policy Count" value={totPolicies.toLocaleString()}/>
          </div>

          {/* Agency cards */}
          {agencies.map(agencyName=>{
            const t=agTot(agencyName);
            const ann=annotations[agencyName]||[];
            const isExp=expanded===agencyName;
            const brokers=agencyMap[agencyName];
            const sortedBrokers=Object.entries(brokers).sort(
              (a,b)=>b[1].rows.reduce((s,r)=>s+r.BIND_PREMIUM,0)-a[1].rows.reduce((s,r)=>s+r.BIND_PREMIUM,0)
            );
            return(
              <div key={agencyName} style={{background:C.surface,border:`1px solid ${isExp?C.accentLt:C.border}`,
                borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.07)",
                transition:"border-color .15s"}}>
                <div onClick={()=>{setExpanded(isExp?null:agencyName);setExpandedBroker(null);}}
                  style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                    padding:"12px 16px",cursor:"pointer",background:isExp?C.surface2:C.surface,
                    transition:"background .15s"}}>
                  <div>
                    <div style={{fontWeight:600,color:C.text}}>{agencyName}</div>
                    <div style={{fontSize:12,color:C.muted,marginTop:2}}>{t.brokerCount} broker{t.brokerCount!==1?"s":""} · {t.policyCount} policies</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:14,fontWeight:700,color:C.green}}>{fmt(t.bindPremium)}</div>
                      <div style={{fontSize:11,color:C.muted}}>Bind Premium</div>
                    </div>
                    {ann.length>0&&<Badge label={`${ann.length} notes`} color="yellow"/>}
                    <span style={{color:C.muted,fontSize:12}}>{isExp?"▲":"▼"}</span>
                  </div>
                </div>

                {isExp&&(
                  <div style={{borderTop:`1px solid ${C.border}`,padding:16,display:"flex",flexDirection:"column",gap:16,background:C.surface}}>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
                      <StatCard label="Bind Premium" value={fmt(t.bindPremium)} accent={C.green}/>
                      <StatCard label="Total Bind Cost" value={fmt(t.totalBindCost)} accent={C.accent}/>
                      <StatCard label="Policy Count" value={t.policyCount.toLocaleString()}/>
                    </div>

                    <div>
                      <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Brokers</div>
                      <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        {sortedBrokers.map(([brokerName,bData])=>{
                          const bp=bData.rows.reduce((s,r)=>s+r.BIND_PREMIUM,0);
                          const tc=bData.rows.reduce((s,r)=>s+r.TOTAL_BIND_COST,0);
                          const pc=bData.rows.reduce((s,r)=>s+r.POLICY_COUNT,0);
                          const carriers=uniq(bData.rows.map(r=>r.CARRIER_NAME));
                          const lobs=uniq(bData.rows.map(r=>r.POLICYTYPE_NAME));
                          const states=uniq(bData.rows.map(r=>r.STATE_NAME));
                          const branches=uniq(bData.rows.map(r=>r.BRANCH_NAME));
                          const bKey=`${agencyName}::${brokerName}`;
                          const bExp=expandedBroker===bKey;
                          return(
                            <div key={brokerName} style={{borderRadius:8,
                              border:`1px solid ${bExp?C.accentLt:C.border}`,
                              background:bExp?C.surface2:"#f9fbf9"}}>
                              <div onClick={()=>setExpandedBroker(bExp?null:bKey)}
                                style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                                  padding:"8px 12px",cursor:"pointer"}}>
                                <div>
                                  <span style={{color:C.text,fontSize:13,fontWeight:500}}>{brokerName}</span>
                                  {bData.email&&<span style={{color:C.muted,fontSize:11,marginLeft:8}}>{bData.email}</span>}
                                </div>
                                <div style={{display:"flex",alignItems:"center",gap:12}}>
                                  <div style={{textAlign:"right"}}>
                                    <div style={{fontSize:13,color:C.green,fontWeight:700}}>{fmt(bp)}</div>
                                    <div style={{fontSize:11,color:C.muted}}>{pc} policies</div>
                                  </div>
                                  <span style={{color:C.muted,fontSize:11}}>{bExp?"▲":"▼"}</span>
                                </div>
                              </div>
                              {bExp&&(
                                <div style={{borderTop:`1px solid ${C.border}`,padding:12,display:"flex",flexDirection:"column",gap:12}}>
                                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                                    <StatCard label="Bind Premium" value={fmt(bp)} accent={C.green}/>
                                    <StatCard label="Total Bind Cost" value={fmt(tc)} accent={C.accent}/>
                                  </div>
                                  <div style={{display:"flex",flexDirection:"column",gap:6,fontSize:12}}>
                                    {carriers.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}><span style={{color:C.muted,width:80,flexShrink:0}}>Carriers</span>{carriers.map(c=><Badge key={c} label={c} color="gray"/>)}</div>}
                                    {lobs.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}><span style={{color:C.muted,width:80,flexShrink:0}}>Policy Types</span>{lobs.map(l=><Badge key={l} label={l} color="blue"/>)}</div>}
                                    {states.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}><span style={{color:C.muted,width:80,flexShrink:0}}>States</span>{states.map(s=><Badge key={s} label={s} color="purple"/>)}</div>}
                                    {branches.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}><span style={{color:C.muted,width:80,flexShrink:0}}>Branch</span>{branches.map(b=><Badge key={b} label={b} color="gray"/>)}</div>}
                                  </div>
                                  <div style={{overflowX:"auto",borderRadius:8,border:`1px solid ${C.border}`}}>
                                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                                      <thead>
                                        <tr style={{background:C.surface2,color:C.muted,fontSize:11,textTransform:"uppercase",letterSpacing:.5}}>
                                          {["Tx Type","Policy Type","State","Carrier","Bind Prem","Fees","Total Cost","Policies"].map(h=>(
                                            <th key={h} style={{padding:"8px 12px",textAlign:["Bind Prem","Fees","Total Cost","Policies"].includes(h)?"right":"left",fontWeight:600}}>{h}</th>
                                          ))}
                                        </tr>
                                      </thead>
                                      <tbody>
                                        {bData.rows.sort((a,b)=>b.BIND_PREMIUM-a.BIND_PREMIUM).map((r,i)=>(
                                          <tr key={i} style={{borderTop:`1px solid ${C.border}`,background:i%2===0?C.surface:C.surface2}}>
                                            <td style={{padding:"6px 12px"}}><Badge label={r.TRANSACTION_TYPE||"—"} color={r.TRANSACTION_TYPE==="New"?"green":"yellow"}/></td>
                                            <td style={{padding:"6px 12px",color:C.text}}>{r.POLICYTYPE_NAME}</td>
                                            <td style={{padding:"6px 12px",color:C.textSub}}>{r.STATE_NAME}</td>
                                            <td style={{padding:"6px 12px",color:C.textSub}}>{r.CARRIER_NAME}</td>
                                            <td style={{padding:"6px 12px",textAlign:"right",color:C.green,fontWeight:700}}>{fmt(r.BIND_PREMIUM)}</td>
                                            <td style={{padding:"6px 12px",textAlign:"right",color:C.textSub}}>{fmt(r.FEES_AND_DUES)}</td>
                                            <td style={{padding:"6px 12px",textAlign:"right",color:C.accent,fontWeight:700}}>{fmt(r.TOTAL_BIND_COST)}</td>
                                            <td style={{padding:"6px 12px",textAlign:"right",color:C.text}}>{r.POLICY_COUNT}</td>
                                          </tr>
                                        ))}
                                      </tbody>
                                    </table>
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                    <AnnotationBlock entityId={agencyName} annotations={ann} onAnnotate={onAnnotate}/>
                  </div>
                )}
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

// ── Query Library ────────────────────────────────────────────────────────────
const INIT_QUERIES=[
  {id:"Q001",name:"Abacus Policy Detail — Validated Jan 2026",validated:true,validatedDate:"2026-01-01",
   description:"New & Renewal, effective Jan 2026. Groups by agency, broker, branch, policy type, state, transaction type.",
   sql:`SELECT
    COALESCE(ag.AGENCY_NAME, ag3.AGENCY_NAME)     AS AGENCY_NAME,
    COALESCE(
        ag2.FIRST_NAME || ' ' || ag2.LAST_NAME,
        sp.BROKER_NAME
    )                                              AS BROKER_NAME,
    b.EMAIL                                        AS BROKER_EMAIL,
    MAX(ac.CARRIER_NAME)                          AS CARRIER_NAME,
    al.BRANCH_NAME,
    sp.POLICYTYPE_NAME,
    sp.STATE_NAME,
    ac.TRANSACTION_TYPE,
    COUNT(DISTINCT p.POLICY_NUMBER)               AS POLICY_COUNT,
    SUM(ac.BIND_PREMIUM)                          AS BIND_PREMIUM,
    SUM(ac.FEES_AND_DUES)                         AS FEES_AND_DUES,
    SUM(ac.BIND_FEES_AND_DUES)                    AS BIND_FEES_AND_DUES,
    SUM(ac.BIND_PREMIUM + ac.BIND_FEES_AND_DUES)  AS TOTAL_BIND_COST
FROM REPORTING.CORE_CURATION.ACCOUNTING ac
JOIN REPORTING.CORE_CURATION.POLICY p
    ON ac.POLICY_KEY = p.POLICY_KEY
JOIN REPORTING.CORE_CURATION.APPLICATION a
    ON p.APPLICATION_KEY = a.APPLICATION_KEY
JOIN REPORTING.CORE_CURATION.APPLICATION_LOB al
    ON a.APPLICATION_LOB_KEY = al.APPLICATION_LOB_KEY
LEFT JOIN REPORTING.CORE.DIM_AGENCY ag
    ON ac.AGENCY_KEY = ag.AGENCY_KEY
LEFT JOIN REPORTING.CORE.DIM_AGENT ag2
    ON TO_VARCHAR(ac.AGENT_KEY) = ag2.AGENT_KEY
LEFT JOIN REPORTING.CORE_WRAPPERS.ABACUS_SUBMISSION_PIPELINE sp
    ON a.SOURCE_APPLICATION_CODE = sp.SOURCE_APPLICATION_CODE
LEFT JOIN REPORTING.CORE.DIM_AGENCY ag3
    ON sp.AGENCY_KEY = ag3.AGENCY_KEY
LEFT JOIN (
    SELECT
        BROKER_FIRST_NAME || ' ' || BROKER_LAST_NAME AS BROKER_FULL_NAME,
        EMAIL,
        ROW_NUMBER() OVER (
            PARTITION BY BROKER_FIRST_NAME || ' ' || BROKER_LAST_NAME
            ORDER BY IS_INACTIVE ASC, CREATED_AT DESC
        ) AS RN
    FROM DEVELOPMENT.CORE_STAGING.STG_ABACUS__BROKERS
) b ON sp.BROKER_NAME = b.BROKER_FULL_NAME
   AND b.RN = 1
WHERE ac.SOURCE_SYSTEM = 'ABACUS'
  AND ac.TRANSACTION_TYPE IN ('New', 'Renewal')
  AND a.EFFECTIVE_AT_APP >= '2026-01-01'
  AND a.EFFECTIVE_AT_APP <  '2026-02-01'
GROUP BY
    COALESCE(ag.AGENCY_NAME, ag3.AGENCY_NAME),
    COALESCE(ag2.FIRST_NAME || ' ' || ag2.LAST_NAME, sp.BROKER_NAME),
    b.EMAIL, al.BRANCH_NAME, sp.POLICYTYPE_NAME, sp.STATE_NAME, ac.TRANSACTION_TYPE
ORDER BY BIND_PREMIUM DESC;`},
  {id:"Q002",name:"Validation — Tie to FACT_POLICY_TRANSACTION",validated:true,validatedDate:"2026-01-01",
   description:"Confirms bind premium and bind count tie between ACCOUNTING and FACT_POLICY_TRANSACTION.",
   sql:`-- ACCOUNTING source
SELECT
  SUM(BIND_PREMIUM)               AS total_bind_premium,
  COUNT(DISTINCT APPLICATION_KEY) AS bind_count
FROM REPORTING.CORE_CURATION.ACCOUNTING
WHERE SOURCE_SYSTEM = 'ABACUS'
  AND EFFECTIVE_DATE BETWEEN :start_date AND :end_date;

-- FACT_POLICY_TRANSACTION source (tie-out)
SELECT
  SUM(BIND_PREMIUM)               AS total_bind_premium,
  COUNT(DISTINCT APPLICATION_KEY) AS bind_count
FROM REPORTING.CORE_CURATION.FACT_POLICY_TRANSACTION
WHERE SOURCE_SYSTEM = 'ABACUS'
  AND EFFECTIVE_DATE BETWEEN :start_date AND :end_date;`},
];

function QueryLibrary(){
  const [selected,setSelected]=useState("Q001");
  const [queries,setQueries]=useState(()=>{
    try{const s=localStorage.getItem("abacus_queries");return s?JSON.parse(s):INIT_QUERIES;}catch{return INIT_QUERIES;}
  });
  const [adding,setAdding]=useState(false);
  const [newName,setNewName]=useState("");const [newDesc,setNewDesc]=useState("");const [newSql,setNewSql]=useState("");
  const [copied,setCopied]=useState(false);

  const save=qs=>{setQueries(qs);try{localStorage.setItem("abacus_queries",JSON.stringify(qs));}catch{}};
  const addQuery=()=>{
    if(!newName.trim()||!newSql.trim())return;
    save([...queries,{id:`Q${Date.now()}`,name:newName,description:newDesc,validated:false,validatedDate:null,sql:newSql}]);
    setNewName("");setNewDesc("");setNewSql("");setAdding(false);
  };
  const toggleValidated=id=>save(queries.map(q=>q.id===id?{...q,validated:!q.validated,validatedDate:!q.validated?new Date().toISOString().slice(0,10):null}:q));
  const deleteQuery=id=>{save(queries.filter(q=>q.id!==id));if(selected===id)setSelected(null);};
  const copySql=sql=>{navigator.clipboard.writeText(sql).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1500);});};
  const sel=queries.find(q=>q.id===selected);

  const inputStyle={background:C.surface,border:`1px solid ${C.border}`,color:C.text,borderRadius:8,
    padding:"8px 12px",fontSize:13,outline:"none",width:"100%"};

  return(
    <div style={{display:"flex",gap:16,minHeight:420}}>
      <div style={{width:220,flexShrink:0,display:"flex",flexDirection:"column",gap:8}}>
        {queries.map(q=>(
          <div key={q.id} onClick={()=>setSelected(q.id)}
            style={{padding:12,borderRadius:8,cursor:"pointer",
              border:`1px solid ${selected===q.id?C.accentLt:C.border}`,
              background:selected===q.id?C.surface2:C.surface,
              boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
            <div style={{fontSize:13,fontWeight:500,color:C.text,lineHeight:1.4}}>{q.name}</div>
            {q.validated&&<div style={{marginTop:6}}><Badge label="✓ Validated" color="green"/></div>}
          </div>
        ))}
        <button onClick={()=>setAdding(!adding)}
          style={{padding:"8px 0",borderRadius:8,border:`1px dashed ${C.border2}`,background:"none",
            color:C.muted,fontSize:13,cursor:"pointer"}}>+ Add Query</button>
      </div>
      <div style={{flex:1,minWidth:0}}>
        {adding?(
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,
            display:"flex",flexDirection:"column",gap:12,boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
            <div style={{fontSize:14,fontWeight:600,color:C.text}}>New Query</div>
            <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Query name" style={inputStyle}/>
            <input value={newDesc} onChange={e=>setNewDesc(e.target.value)} placeholder="Description (optional)" style={inputStyle}/>
            <textarea value={newSql} onChange={e=>setNewSql(e.target.value)} placeholder="Paste SQL here..." rows={8}
              style={{...inputStyle,color:C.accent,fontFamily:"monospace",fontSize:12,resize:"vertical"}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={addQuery} style={{padding:"7px 16px",background:C.primary,color:"#fff",border:"none",borderRadius:8,fontSize:13,cursor:"pointer"}}>Save</button>
              <button onClick={()=>setAdding(false)} style={{padding:"7px 16px",background:C.surface2,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        ):sel?(
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,
            display:"flex",flexDirection:"column",gap:12,boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
            <div style={{display:"flex",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
              <div>
                <div style={{fontSize:15,fontWeight:600,color:C.text}}>{sel.name}</div>
                {sel.description&&<div style={{fontSize:13,color:C.muted,marginTop:4}}>{sel.description}</div>}
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick={()=>toggleValidated(sel.id)}
                  style={{fontSize:12,padding:"4px 12px",borderRadius:8,cursor:"pointer",
                    border:`1px solid ${sel.validated?C.accentLt:C.border}`,
                    background:sel.validated?C.greenLt:"none",
                    color:sel.validated?C.green:C.muted}}>
                  {sel.validated?`✓ Validated ${sel.validatedDate}`:"Mark Validated"}
                </button>
                <button onClick={()=>copySql(sel.sql)}
                  style={{fontSize:12,padding:"4px 12px",borderRadius:8,cursor:"pointer",
                    border:`1px solid ${C.border}`,background:"none",color:C.muted}}>
                  {copied?"Copied!":"Copy SQL"}
                </button>
                {!INIT_QUERIES.find(q=>q.id===sel.id)&&(
                  <button onClick={()=>deleteQuery(sel.id)}
                    style={{fontSize:12,padding:"4px 12px",borderRadius:8,cursor:"pointer",
                      border:`1px solid #fca5a5`,background:C.dangerBg,color:C.danger}}>Delete</button>
                )}
              </div>
            </div>
            <pre style={{background:"#f6fff6",border:`1px solid ${C.border}`,borderRadius:8,padding:16,
              color:C.accent,fontFamily:"monospace",fontSize:12,overflowX:"auto",whiteSpace:"pre-wrap",lineHeight:1.6}}>{sel.sql}</pre>
          </div>
        ):(
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:C.muted,fontSize:14}}>Select a query</div>
        )}
      </div>
    </div>
  );
}

// ── Annotations ──────────────────────────────────────────────────────────────
function AnnotationBlock({entityId,annotations,onAnnotate}){
  const [text,setText]=useState("");
  const [tag,setTag]=useState("General");
  const submit=()=>{if(!text.trim())return;onAnnotate(entityId,{text,tag,date:new Date().toISOString().slice(0,10)});setText("");};
  return(
    <div>
      <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Notes & Findings</div>
      {annotations.length>0&&(
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
          {annotations.map((a,i)=>{
            const c=TAG_COLORS[a.tag]||TAG_COLORS.General;
            return(
              <div key={i} style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,
                padding:"8px 12px",display:"flex",alignItems:"flex-start",gap:8}}>
                <span style={{background:c.bg,color:c.text,border:`1px solid ${c.border}`,
                  fontSize:11,padding:"2px 8px",borderRadius:999,flexShrink:0}}>{a.tag}</span>
                <span style={{color:C.text,fontSize:13,flex:1}}>{a.text}</span>
                <span style={{fontSize:11,color:C.muted,flexShrink:0}}>{a.date}</span>
              </div>
            );
          })}
        </div>
      )}
      <div style={{display:"flex",gap:8}}>
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}
          placeholder="Add a note..."
          style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,color:C.text,
            borderRadius:8,padding:"7px 12px",fontSize:13,outline:"none"}}/>
        <select value={tag} onChange={e=>setTag(e.target.value)}
          style={{background:C.surface,border:`1px solid ${C.border}`,color:C.text,
            borderRadius:8,padding:"7px 10px",fontSize:12,outline:"none"}}>
          {Object.keys(TAG_COLORS).map(t=><option key={t}>{t}</option>)}
        </select>
        <button onClick={submit}
          style={{padding:"7px 14px",background:C.primary,color:"#fff",border:"none",
            borderRadius:8,fontSize:13,cursor:"pointer"}}>Add</button>
      </div>
    </div>
  );
}

function AnnotationsTab({annotations}){
  const all=[];
  Object.entries(annotations).forEach(([entityId,notes])=>notes.forEach(n=>all.push({...n,entityId})));
  all.sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(all.length===0)return(
    <div style={{textAlign:"center",color:C.muted,padding:"48px 0",fontSize:14}}>No annotations yet. Expand an agency to add notes.</div>
  );
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {all.map((n,i)=>{
        const c=TAG_COLORS[n.tag]||TAG_COLORS.General;
        return(
          <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,
            boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{color:C.text,fontSize:13,fontWeight:500}}>{n.entityId}</span>
                <span style={{background:c.bg,color:c.text,border:`1px solid ${c.border}`,
                  fontSize:11,padding:"2px 8px",borderRadius:999}}>{n.tag}</span>
              </div>
              <span style={{fontSize:11,color:C.muted}}>{n.date}</span>
            </div>
            <p style={{color:C.textSub,fontSize:13}}>{n.text}</p>
          </div>
        );
      })}
    </div>
  );
}

// ── Main ─────────────────────────────────────────────────────────────────────
function App(){
  const [activeTab,setActiveTab]=useState(0);
  const [annotations,setAnnotations]=useState(()=>{
    try{const s=localStorage.getItem("abacus_annotations");return s?JSON.parse(s):{};}catch{return{};}
  });

  const handleAnnotate=useCallback((entityId,note)=>{
    setAnnotations(prev=>{
      const updated={...prev,[entityId]:[...(prev[entityId]||[]),note]};
      try{localStorage.setItem("abacus_annotations",JSON.stringify(updated));}catch{}
      return updated;
    });
  },[]);

  const annCount=Object.values(annotations).flat().length;

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"system-ui,sans-serif"}}>
      {/* Header */}
      <div style={{background:C.header,padding:"14px 24px",display:"flex",alignItems:"center",
        justifyContent:"space-between",boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18,fontWeight:700,color:"#fff"}}>Abacus Intelligence</span>
            <span style={{background:"rgba(255,255,255,0.15)",color:"#d8f3dc",border:"1px solid rgba(255,255,255,0.25)",
              fontSize:11,padding:"2px 10px",borderRadius:999,fontWeight:500}}>Entertainment</span>
          </div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.55)",marginTop:2}}>SOURCE_SYSTEM = 'ABACUS' · Drop a CSV to load</div>
        </div>
        {annCount>0&&<div style={{fontSize:12,color:"rgba(255,255,255,0.6)"}}>{annCount} annotation{annCount!==1?"s":""} saved</div>}
      </div>

      {/* Tabs */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"0 24px",
        display:"flex",gap:4,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        {TABS.map((t,i)=>(
          <button key={t} onClick={()=>setActiveTab(i)}
            style={{padding:"12px 16px",fontSize:13,fontWeight:500,border:"none",
              borderBottom:`2px solid ${activeTab===i?C.tabActive:"transparent"}`,
              color:activeTab===i?C.tabActive:C.tabInactive,background:"none",cursor:"pointer",
              display:"flex",alignItems:"center",gap:6,transition:"color .15s"}}>
            {t}
            {t==="Annotations"&&annCount>0&&(
              <span style={{background:C.yellowBg,color:C.yellow,fontSize:11,padding:"1px 6px",borderRadius:999,
                border:`1px solid #fcd34d`}}>{annCount}</span>
            )}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{padding:24}}>
        {activeTab===0&&<AgencyExplorer annotations={annotations} onAnnotate={handleAnnotate}/>}
        {activeTab===1&&<QueryLibrary/>}
        {activeTab===2&&<AnnotationsTab annotations={annotations}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
